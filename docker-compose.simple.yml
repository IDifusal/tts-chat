# Simple production setup - Low resources
# Usage: docker-compose -f docker-compose.simple.yml up -d
#
# SQLite: DB is at ./data/streams.db on the host, mounted at /app/data.
# DATABASE_PATH is set so the container always uses the volume (no in-image DB).

services:
  tts-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kick-tts-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/streams.db
    volumes:
      - ./static/audio:/app/static/audio
      - ./static/cache:/app/static/cache
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - tts-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  tts-network:
    driver: bridge
